<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports Studio</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0a0a0a;
  color:#fff;
}

#chat {
  height:80vh;
  overflow:auto;
  padding:20px;
}

.msg {
  margin-bottom:10px;
}

.user { color:#39ff14; }
.bot { color:#fff; }

#inputArea {
  display:flex;
  padding:10px;
  border-top:1px solid #333;
}

#input {
  flex:1;
  padding:10px;
  font-size:16px;
  background:#111;
  color:#fff;
  border:1px solid #333;
}

button {
  padding:10px 15px;
  margin-left:10px;
  background:#39ff14;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Digite..." />
  <button onclick="send()">Enviar</button>
</div>

<script>
let history = [];

const chat = document.getElementById('chat');
const input = document.getElementById('input');

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerText = (role === 'user' ? 'Você: ' : 'Bot: ') + text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  input.value = '';

  addMsg('user', text);

  history.push({
    role: "user",
    content: text
  });

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });

    const data = await res.json();

    const reply = data.content?.[0]?.text || "Erro";

    addMsg('bot', reply);

    history.push({
      role: "assistant",
      content: reply
    });

  } catch (err) {
    addMsg('bot', 'Erro ao conectar com servidor');
    console.error(err);
  }
}

// ENTER envia
input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') send();
});

// BOOT (senha inicial)
async function boot() {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messages: [{ role: "user", content: "start" }]
    })
  });

  const data = await res.json();
  const reply = data.content?.[0]?.text || "";

  addMsg('bot', reply);

  history.push({
    role: "assistant",
    content: reply
  });
}

boot();
</script>

</body>
</html>
